<div class="flex items-center p-4 bg-gray-50 rounded-lg mt-5">
  <div class="flex-shrink-0 mr-4">
    <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
      </path>
    </svg>
  </div>
  <div class="flex-grow">
    <h3 class="font-bold">{{task().name | titlecase}}</h3>
    <p class="text-sm text-gray-500">Vence: {{task().dueDate | date}}</p>
  </div>
  <a
    [routerLink]="['/courses/course', courseId(), 'task', task().id]"
    class="px-4 py-2 cursor-pointer bg-green-600 text-white rounded-lg hover:bg-green-700"
  >Start</a>
</div>
