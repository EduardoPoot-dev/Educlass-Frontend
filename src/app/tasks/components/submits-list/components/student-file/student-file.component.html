 <div class="mt-2">
    <div class="flex w-3/4 items-center justify-between p-3 bg-gray-50 rounded-lg">

      <div class="flex items-center">
        <svg class="w-6 text-blue-600 mr-2" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 7C16 9.20914 14.2091 11 12 11C9.79086 11 8 9.20914 8 7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7Z" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 14C8.13401 14 5 17.134 5 21H19C19 17.134 15.866 14 12 14Z" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>


        <div class="w-32">
          <p class="font-medium text-sm">
            Alumno: <span class="font-normal">{{studentData().user.name | titlecase}}</span>
          </p>

        </div>



        <div class="flex flex-col">
          @for (item of studentData().files; track $index) {
            <div class="flex mt-2">
              <svg class="w-6 h-6 text-blue-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z">
                </path>
              </svg>
              <a
                [href]="item.url"
                target="_blank"
                rel="noreferrer noopener"
              >{{formatFileName(item.url) | slice: 0 : 20}}.pdf</a>
              </div>
          }
        </div>
      </div>
      <!-- <button class="text-red-600 hover:text-red-700">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
          </path>
        </svg>
      </button> -->
    </div>
  </div>
